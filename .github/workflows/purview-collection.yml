name: Purview Collection

on:
  # Kann manuell ausgeführt werden (für Tests)
  workflow_dispatch:

  # Wird vom Haupt-Workflow aufgerufen
  workflow_call:

# Purview muss in exports/ committen damit Generate-GRCReport die Daten findet
permissions:
  contents: write

jobs:
  collect-purview:
    name: Collect Purview Labels and DLP Policies
    # Windows Runner erforderlich: Connect-IPPSSession mit CSP-Zertifikat benötigt
    # den Windows-Zertifikatsspeicher (Cert:\CurrentUser\My) und CertificateThumbprint.
    # EphemeralKeySet auf Linux ist mit CSP-Provider-Zertifikaten nicht kompatibel.
    runs-on: windows-latest

    env:
      GRC_CLIENT_ID:            ${{ secrets.GRC_CLIENT_ID }}
      GRC_TENANT_ID:            ${{ secrets.GRC_TENANT_ID }}
      GRC_ORGANIZATION:         ${{ secrets.GRC_ORGANIZATION }}
      GRC_CERTIFICATE:          ${{ secrets.GRC_CERTIFICATE }}
      GRC_CERTIFICATE_PASSWORD: ${{ secrets.GRC_CERTIFICATE_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pinned ExchangeOnlineManagement 3.9.0
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

          Install-Module -Name ExchangeOnlineManagement -RequiredVersion 3.9.0 -Scope CurrentUser -Force -AllowClobber
          Import-Module ExchangeOnlineManagement -RequiredVersion 3.9.0 -ErrorAction Stop

          Get-Module ExchangeOnlineManagement -ListAvailable |
            Sort-Object Version -Descending |
            Select-Object Name, Version, Path -First 5 |
            Format-List

      - name: Run Purview Summary Collector
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Write-Host "Starting Purview Summary Collector..." -ForegroundColor Cyan
          ./services/Purview/powershell/Get-PurviewSummary.ps1 `
            -TenantId            $env:GRC_TENANT_ID `
            -ClientId            $env:GRC_CLIENT_ID `
            -CertificateBase64   $env:GRC_CERTIFICATE `
            -CertificatePassword $env:GRC_CERTIFICATE_PASSWORD

      - name: Commit and Push Purview exports
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }}
          git add -f exports/Purview/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update Purview exports [skip ci]"
          git push origin ${{ github.ref_name }}

      - name: Upload Purview artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: purview-summary
          path: exports/Purview/
          if-no-files-found: warn
          retention-days: 14
