name: Purview DLP Labels Only Windows

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  read-purview-labels:
    name: Read Purview labels via IPPS on Windows
    runs-on: windows-latest

    env:
      GRC_CLIENT_ID: ${{ secrets.GRC_CLIENT_ID }}
      GRC_TENANT_ID: ${{ secrets.GRC_TENANT_ID }}
      GRC_ORGANIZATION: ${{ secrets.GRC_ORGANIZATION }}
      GRC_CERTIFICATE: ${{ secrets.GRC_CERTIFICATE }}
      GRC_CERTIFICATE_PASSWORD: ${{ secrets.GRC_CERTIFICATE_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install required PowerShell module
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name ExchangeOnlineManagement -Scope CurrentUser -Force -AllowClobber

          Import-Module ExchangeOnlineManagement -ErrorAction Stop

          Get-Module ExchangeOnlineManagement -ListAvailable |
            Sort-Object Version -Descending |
            Select-Object Name, Version, Path -First 1 |
            Format-List

      - name: Read Purview labels only
        shell: powershell
        run: |
          .\scripts\Export-PurviewDlpLabelsOnly-Windows.ps1 `
            -OutputDirectory '.\output'

      - name: Upload Purview label output and IPPS logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: purview-dlp-labels-only-windows
          path: output/
          if-no-files-found: warn
          retention-days: 14
